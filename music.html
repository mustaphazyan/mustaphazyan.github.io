<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الموسيقية | Melody</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .album-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }
        .album-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
        }
        .album-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .album-card h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .album-card p {
            font-size: 14px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container" style="grid-template-rows: 1fr;">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-music"></i>
                <span>Melody</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                    <li class="active"><a href="music.html"><i class="fas fa-compact-disc"></i> مكتبتي</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <div class="user-profile">
                    <span>مرحباً، مستخدم بريميوم</span>
                    <img src="https://ui-avatars.com/api/?name=User&background=1DB954&color=fff" alt="User">
                </div>
            </header>

            <section>
                <h1>مكتبتي الموسيقية</h1>
                <div class="library-grid">
                    <div class="album-card">
                        <img src="covers/cover1.jpg" alt="Album">
                        <h4>أغنية تجريبية 1</h4>
                        <p>فنان 1</p>
                    </div>
                    <div class="album-card">
                        <img src="covers/cover2.jpg" alt="Album">
                        <h4>أغنية تجريبية 2</h4>
                        <p>فنان 2</p>
                    </div>
                    <!-- يمكن إضافة المزيد هنا -->
                </div>
            </section>
        </main>
    </div>
</body>
</html>
