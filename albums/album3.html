<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Street Voice - Mustapha Zyan">
    <title>Street Voice | Mustapha Zyan</title>
    <link rel="preload" href="../style.css" as="style">
    <link rel="preload" href="./album.css" as="style">
    <link rel="preload" href="../script.js" as="script">
    <link rel="preload" href="../artist/artist.jpg" as="image">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./album.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo-link">
                <div class="logo">
                    <span class="logo-text">MUSTAPHA ZYAN</span>
                    <span class="logo-subtitle">Modern Rai</span>
                </div>
            </a>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../index.html#biography" class="nav-link">Biography</a></li>
                <li><a href="../index.html#discography" class="nav-link">Albums</a></li>
                <li><a href="../integrated-player.html" class="nav-link">Player</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <section class="album-header-premium">
        <div class="header-container">
            <div class="header-left">
                <div class="artist-image-wrapper">
                    <img src="../artist/artist.jpg" alt="Mustapha Zyan" class="artist-image-large" loading="lazy">
                    <div class="image-border"></div>
                </div>
            </div>
            <div class="header-right">
                <div class="album-meta">
                    <p class="album-year">2022</p>
                    <h1 class="album-title-main">Street Voice</h1>
                    <p class="artist-name-large">Mustapha Zyan</p>
                </div>
                <p class="album-bio">Authentic street sounds with traditional Rai roots</p>
                <div class="social-suite-premium">
                    <a href="https://youtube.com" target="_blank" class="social-btn-premium"><i class="fab fa-youtube"></i><span>YouTube</span></a>
                    <a href="https://instagram.com" target="_blank" class="social-btn-premium"><i class="fab fa-instagram"></i><span>Instagram</span></a>
                    <a href="https://tiktok.com" target="_blank" class="social-btn-premium"><i class="fab fa-tiktok"></i><span>TikTok</span></a>
                    <a href="https://spotify.com" target="_blank" class="social-btn-premium"><i class="fab fa-spotify"></i><span>Spotify</span></a>
                </div>
            </div>
        </div>
    </section>

    <section class="visualizer-section">
        <canvas id="visualizer"></canvas>
    </section>

    <section class="playlist-section-spotify">
        <div class="container">
            <h2 class="playlist-title">Playlist</h2>
            <div class="songs-table-wrapper">
                <table class="songs-table">
                    <thead>
                        <tr>
                            <th class="col-number">#</th>
                            <th class="col-title">Track</th>
                            <th class="col-duration">Duration</th>
                        </tr>
                    </thead>
                    <tbody id="songsList"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section class="sticky-player">
        <div class="player-container">
            <div class="now-playing-info">
                <div class="now-playing-cover">
                    <img id="playerCover" src="../covers/album1.jpg" alt="Album Cover" loading="lazy">
                </div>
                <div class="now-playing-text">
                    <p class="now-playing-title" id="nowPlayingTitle">Track 1</p>
                    <p class="now-playing-artist" id="nowPlayingArtist">Mustapha Zyan</p>
                </div>
            </div>
            <div class="player-progress">
                <span class="time-current" id="currentTime">0:00</span>
                <div class="progress-bar-sticky" id="progressBar">
                    <div class="progress-fill-sticky" id="progressFill"></div>
                </div>
                <span class="time-duration" id="duration">0:00</span>
            </div>
            <div class="player-controls-sticky">
                <button class="control-btn-sticky" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn-sticky play-btn-sticky" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="control-btn-sticky" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="volume-control-sticky">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.8" class="volume-slider-sticky">
            </div>
        </div>
    </section>

    <audio id="audioPlayer"></audio>
    <script src="../script.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.initializeAlbumPlayer('album3');
            setupAudioControls();
        });

        function setupAudioControls() {
            const audioPlayer = document.getElementById('audioPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressBar = document.getElementById('progressBar');
            const volumeSlider = document.getElementById('volumeSlider');

            playPauseBtn.addEventListener('click', () => {
                if (audioPlayer.paused) play(); else pause();
            });
            prevBtn.addEventListener('click', () => {
                currentSongIndex = (currentSongIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
                loadSong(currentSongIndex);
                play();
            });
            nextBtn.addEventListener('click', () => {
                currentSongIndex = (currentSongIndex + 1) % currentAlbum.songs.length;
                loadSong(currentSongIndex);
                play();
            });
            audioPlayer.addEventListener('timeupdate', () => {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                document.getElementById('progressFill').style.width = `${percent}%`;
                const currentMin = Math.floor(audioPlayer.currentTime / 60);
                const currentSec = Math.floor(audioPlayer.currentTime % 60);
                document.getElementById('currentTime').textContent = `${currentMin}:${currentSec < 10 ? '0' : ''}${currentSec}`;
            });
            audioPlayer.addEventListener('loadedmetadata', () => {
                const min = Math.floor(audioPlayer.duration / 60);
                const sec = Math.floor(audioPlayer.duration % 60);
                document.getElementById('duration').textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            });
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audioPlayer.currentTime = percent * audioPlayer.duration;
            });
            volumeSlider.addEventListener('input', (e) => {
                audioPlayer.volume = e.target.value;
            });
            audioPlayer.addEventListener('ended', () => nextBtn.click());
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') { e.preventDefault(); playPauseBtn.click(); }
                if (e.code === 'ArrowRight') audioPlayer.currentTime += 5;
                if (e.code === 'ArrowLeft') audioPlayer.currentTime -= 5;
            });
        }
    </script>
</body>
</html>
