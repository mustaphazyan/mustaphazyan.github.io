<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نداء الروح | موسطفى زيان</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./album.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation with Language Switcher -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo-link">
                <div class="logo">
                    <span class="logo-text">MUSTAPHA ZYAN</span>
                    <span class="logo-subtitle">الراي الحديث</span>
                </div>
            </a>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">الرئيسية</a></li>
                <li><a href="../index.html#biography" class="nav-link">السيرة</a></li>
                <li><a href="../index.html#discography" class="nav-link">الألبومات</a></li>
            </ul>
            <div class="language-switcher">
                <button class="lang-btn active" onclick="changeLanguage('ar')">العربية</button>
                <button class="lang-btn" onclick="changeLanguage('en')">English</button>
                <button class="lang-btn" onclick="changeLanguage('fr')">Français</button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Premium Album Header Section -->
    <section class="album-header-premium">
        <div class="header-container">
            <!-- Left: Artist Image -->
            <div class="header-left">
                <div class="artist-image-wrapper">
                    <img src="../artist/artist.jpg" alt="Mustapha Zyan" class="artist-image-large">
                    <div class="image-border"></div>
                </div>
            </div>

            <!-- Right: Album Details -->
            <div class="header-right">
                <div class="album-meta">
                    <p class="album-year" id="albumYear">2024</p>
                    <h1 class="album-title-main" id="albumTitle">نداء الروح</h1>
                    <p class="artist-name-large" id="artistName">موسطفى زيان</p>
                </div>

                <p class="album-bio" id="albumDescription">ألبوم حديث يجمع بين الأصالة والحداثة في تناغم فريد</p>

                <!-- Social Media Suite -->
                <div class="social-suite-premium">
                    <a href="https://youtube.com" target="_blank" class="social-btn-premium" title="YouTube">
                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>
                    </a>
                    <a href="https://instagram.com" target="_blank" class="social-btn-premium" title="Instagram">
                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>
                    </a>
                    <a href="https://tiktok.com" target="_blank" class="social-btn-premium" title="TikTok">
                        <i class="fab fa-tiktok"></i>
                        <span>TikTok</span>
                    </a>
                    <a href="https://spotify.com" target="_blank" class="social-btn-premium" title="Spotify">
                        <i class="fab fa-spotify"></i>
                        <span>Spotify</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Visualizer Section -->
    <section class="visualizer-section">
        <canvas id="visualizer"></canvas>
    </section>

    <!-- Spotify-Style Playlist Section -->
    <section class="playlist-section-spotify">
        <div class="container">
            <h2 class="playlist-title" id="playlistTitle">قائمة الأغاني</h2>
            <div class="songs-table-wrapper">
                <table class="songs-table">
                    <thead>
                        <tr>
                            <th class="col-number">#</th>
                            <th class="col-title" id="trackHeader">الأغنية</th>
                            <th class="col-duration" id="durationHeader">المدة</th>
                        </tr>
                    </thead>
                    <tbody id="songsList">
                        <!-- Songs will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Sticky Modern Audio Player at Bottom -->
    <section class="sticky-player">
        <div class="player-container">
            <!-- Now Playing Info -->
            <div class="now-playing-info">
                <div class="now-playing-cover">
                    <img id="playerCover" src="../covers/album1.jpg" alt="Album Cover">
                </div>
                <div class="now-playing-text">
                    <p class="now-playing-title" id="nowPlayingTitle">الأغنية الأولى</p>
                    <p class="now-playing-artist" id="nowPlayingArtist">موسطفى زيان</p>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="player-progress">
                <span class="time-current" id="currentTime">0:00</span>
                <div class="progress-bar-sticky" id="progressBar">
                    <div class="progress-fill-sticky" id="progressFill"></div>
                </div>
                <span class="time-duration" id="duration">0:00</span>
            </div>

            <!-- Control Buttons -->
            <div class="player-controls-sticky">
                <button class="control-btn-sticky" id="prevBtn" title="السابق">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn-sticky play-btn-sticky" id="playPauseBtn" title="تشغيل">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn-sticky" id="nextBtn" title="التالي">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="volume-control-sticky">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.8" class="volume-slider-sticky">
            </div>
        </div>
    </section>

    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>

    <script src="../script.js"></script>
    <script>
        // Initialize album player on page load
        document.addEventListener('DOMContentLoaded', () => {
            window.initializeAlbumPlayer('album1');
            
            // Update UI on language change
            window.addEventListener('languageChanged', () => {
                updateAlbumPageLanguage();
            });
        });

        // Update album page content based on language
        function updateAlbumPageLanguage() {
            const lang = currentLanguage;
            const album = albumsData.album1;
            
            // Update album details
            document.getElementById('albumTitle').textContent = getLocalizedTitle(album, 'title');
            document.getElementById('albumDescription').textContent = getLocalizedTitle(album, 'description');
            document.getElementById('playlistTitle').textContent = t('player.playlist');
            document.getElementById('trackHeader').textContent = t('player.track');
            document.getElementById('durationHeader').textContent = t('player.duration');
            
            // Re-render songs list with new language
            const songsList = document.getElementById('songsList');
            songsList.innerHTML = '';
            album.songs.forEach((song, index) => {
                const songTitle = lang === 'en' ? song.titleEn : lang === 'fr' ? song.titleFr : song.title;
                const tr = document.createElement('tr');
                tr.className = `song-row ${index === currentSongIndex ? 'active' : ''}`;
                tr.innerHTML = `
                    <td class="col-number">${index + 1}</td>
                    <td class="col-title">${songTitle}</td>
                    <td class="col-duration">${song.duration}</td>
                `;
                tr.addEventListener('click', () => {
                    currentSongIndex = index;
                    loadSong(index);
                    play();
                });
                songsList.appendChild(tr);
            });
            
            // Update language switcher buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.lang-btn[onclick="changeLanguage('${lang}')"]`).classList.add('active');
        }

        // Override the updatePlayerUI to work with new layout
        const originalUpdatePlayerUI = window.updatePlayerUI;
        window.updatePlayerUI = function() {
            const album = currentAlbum;
            document.getElementById('playerCover').src = album.cover;
            document.getElementById('albumTitle').textContent = getLocalizedTitle(album, 'title');
            document.getElementById('artistName').textContent = album.artist;
            document.getElementById('albumYear').textContent = album.year;
            document.getElementById('albumDescription').textContent = getLocalizedTitle(album, 'description');
            document.getElementById('playlistTitle').textContent = t('player.playlist');

            // Render songs list
            const songsList = document.getElementById('songsList');
            songsList.innerHTML = '';
            album.songs.forEach((song, index) => {
                const songTitle = currentLanguage === 'en' ? song.titleEn : currentLanguage === 'fr' ? song.titleFr : song.title;
                const tr = document.createElement('tr');
                tr.className = `song-row ${index === currentSongIndex ? 'active' : ''}`;
                tr.innerHTML = `
                    <td class="col-number">${index + 1}</td>
                    <td class="col-title">${songTitle}</td>
                    <td class="col-duration">${song.duration}</td>
                `;
                tr.addEventListener('click', () => {
                    currentSongIndex = index;
                    loadSong(index);
                    play();
                });
                songsList.appendChild(tr);
            });
        };

        // Update now playing info when song changes
        function updateNowPlayingInfo() {
            if (!currentAlbum || !currentAlbum.songs[currentSongIndex]) return;
            const song = currentAlbum.songs[currentSongIndex];
            const songTitle = currentLanguage === 'en' ? song.titleEn : currentLanguage === 'fr' ? song.titleFr : song.title;
            document.getElementById('nowPlayingTitle').textContent = songTitle;
            document.getElementById('nowPlayingArtist').textContent = currentAlbum.artist;
        }

        // Hook into the loadSong function to update now playing
        const originalLoadSong = window.loadSong;
        window.loadSong = function(index) {
            originalLoadSong(index);
            updateNowPlayingInfo();
        };
    </script>
</body>
</html>
